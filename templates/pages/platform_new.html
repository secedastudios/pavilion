{% extends "base.html" %}

{% block title %}Create Platform — Pavilion{% endblock %}

{% block body %}
<main>
    <article class="platform-form">
        <h1>Launch your streaming platform</h1>

        {% if let Some(msg) = error %}
            <p class="form-error" role="alert">{{ msg }}</p>
        {% endif %}

        <form method="post" action="/platforms">
            <fieldset>
                <legend>Platform details</legend>

                <label for="name">Platform name</label>
                <input type="text" id="name" name="name" required minlength="1" placeholder="My Film Channel">

                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" placeholder="What is your platform about?"></textarea>

                <label for="monetization_model">Monetization model</label>
                <select id="monetization_model" name="monetization_model">
                    <option value="">Select</option>
                    <option value="subscription">Subscription (SVOD)</option>
                    <option value="pay-per-view">Pay-per-view (TVOD)</option>
                    <option value="ad-supported">Ad-supported (AVOD)</option>
                    <option value="free">Free</option>
                    <option value="hybrid">Hybrid</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Theme</legend>

                <label for="primary_color">Primary color</label>
                <input type="color" id="primary_color" name="primary_color" value="#2563eb">

                <label for="secondary_color">Secondary color</label>
                <input type="color" id="secondary_color" name="secondary_color" value="#7c3aed">

                <label for="accent_color">Accent color</label>
                <input type="color" id="accent_color" name="accent_color" value="#f59e0b">

                <label for="border_radius">Border radius</label>
                <select id="border_radius" name="border_radius">
                    <option value="0.25rem">Sharp</option>
                    <option value="0.375rem" selected>Default</option>
                    <option value="0.75rem">Rounded</option>
                    <option value="1rem">Very rounded</option>
                </select>

                <label class="checkbox-label">
                    <input type="checkbox" name="dark_mode" value="yes">
                    Dark mode
                </label>
            </fieldset>

            <button type="submit">Create platform</button>
        </form>
    </article>
</main>
{% endblock %}
