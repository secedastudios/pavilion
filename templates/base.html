<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Pavilion{% endblock %}</title>
    <meta name="description" content="{% block description %}Open film distribution platform where creators keep control and curators build the screens they want.{% endblock %}">
    <link rel="canonical" href="{% block canonical %}https://pavilion.film{% endblock %}">

    <meta property="og:title" content="{% block og_title %}Pavilion{% endblock %}">
    <meta property="og:description" content="{% block og_description %}One upload. Infinite screens. Your rules.{% endblock %}">
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:url" content="{% block og_url %}https://pavilion.film{% endblock %}">
    <meta property="og:image" content="{% block og_image %}/static/images/og-default.png{% endblock %}">
    <meta property="og:site_name" content="Pavilion">

    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="/static/css/main.css">
    {% block head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}

    <aside class="cookie-consent" id="cookie-consent" data-show="!document.cookie.includes('cookie_consent=1')">
        <p>We use essential cookies to make Pavilion work. No tracking cookies are used without your consent.</p>
        <button data-on-click="document.cookie='cookie_consent=1;path=/;max-age=31536000';document.getElementById('cookie-consent').remove()">Accept</button>
    </aside>

    <script type="module" src="https://cdn.jsdelivr.net/npm/@starfederation/datastar"></script>
</body>
</html>
