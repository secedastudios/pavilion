<form data-on-submit="$$put('/films/{{ film.key_str }}')">
    <fieldset>
        <legend>Edit film</legend>

        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ film.title }}" required minlength="1">

        <label for="synopsis">Synopsis</label>
        <textarea id="synopsis" name="synopsis" rows="4">{% if let Some(synopsis) = film.synopsis %}{{ synopsis }}{% endif %}</textarea>

        <label for="year">Year</label>
        <input type="number" id="year" name="year" min="1888" max="2100" {% if let Some(year) = film.year %}value="{{ year }}"{% endif %}>

        <label for="genres">Genres</label>
        <input type="text" id="genres" name="genres" value="{{ film.genres.join(", ") }}">

        <label for="language">Language</label>
        <input type="text" id="language" name="language" {% if let Some(language) = film.language %}value="{{ language }}"{% endif %}>

        <label for="country">Country</label>
        <input type="text" id="country" name="country" {% if let Some(country) = film.country %}value="{{ country }}"{% endif %}>
    </fieldset>

    <button type="submit">Save</button>
    <button type="button" data-on-click="$$get('/films/{{ film.key_str }}')">Cancel</button>
</form>
